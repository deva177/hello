<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Car Dodger</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #2c3e50;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: #34495e;
            border: 4px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Road Lines Animation */
        .road-line {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 60px;
            background: #fff;
            opacity: 0.7;
        }

        /* Cars */
        .car {
            position: absolute;
            width: 45px;
            height: 80px;
            border-radius: 6px;
            transition: left 0.05s linear;
        }

        #player {
            background: #e74c3c; /* Red player car */
            bottom: 20px;
            left: 177px;
            z-index: 2;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.6);
        }

        /* Player Car Details (Windshield & Lights) */
        #player::before, .enemy::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 5px;
            width: 35px;
            height: 15px;
            background: #a6d8f0;
            border-radius: 3px;
        }

        .enemy {
            background: #f1c40f; /* Yellow enemy cars */
            top: -100px;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        /* UI Elements */
        #ui-panel {
            color: white;
            margin-bottom: 15px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #game-over-screen h1 {
            color: #e74c3c;
            font-size: 40px;
            margin-bottom: 10px;
        }

        #start-btn {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #start-btn:hover {
            background: #27ae60;
        }

        .controls-hint {
            color: #bdc3c7;
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui-panel">Score: <span id="score">0</span></div>

    <div id="game-container">
        <div class="road-line" style="top: -80px;"></div>
        <div class="road-line" style="top: 40px;"></div>
        <div class="road-line" style="top: 160px;"></div>
        <div class="road-line" style="top: 280px;"></div>
        <div class="road-line" style="top: 400px;"></div>
        <div class="road-line" style="top: 520px;"></div>

        <div id="player" class="car"></div>

        <div id="enemy" class="car enemy"></div>

        <div id="game-over-screen">
            <h1>GAME OVER</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="start-btn" onclick="startGame()">Play Again</button>
        </div>
    </div>

    <div class="controls-hint">Use <b>Left</b> and <b>Right</b> Arrow Keys to move</div>

    <script>
        const player = document.getElementById('player');
        const enemy = document.getElementById('enemy');
        const scoreDisplay = document.getElementById('score');
        const finalScoreDisplay = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const roadLines = document.querySelectorAll('.road-line');

        // Game state variables
        let playerX = 177; // Starting X position (centered)
        let enemyX = 177;
        let enemyY = -100;
        let enemySpeed = 5;
        let score = 0;
        let isGameOver = false;
        let animationFrameId;

        // Track keyboard inputs
        const keys = {
            ArrowLeft: false,
            ArrowRight: false
        };

        // Event listeners for movement
        document.addEventListener('keydown', (e) => {
            if (e.key in keys) keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key in keys) keys[e.key] = false;
        });

        function startGame() {
            // Reset state
            playerX = 177;
            enemyX = Math.floor(Math.random() * 335); // Random lane placement
            enemyY = -100;
            enemySpeed = 5;
            score = 0;
            isGameOver = false;
            
            scoreDisplay.innerText = score;
            player.style.left = playerX + 'px';
            gameOverScreen.style.display = 'none';

            // Start game loop
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            updateGame();
        }

        function updateGame() {
            if (isGameOver) return;

            // 1. Move Player (Keep within road bounds: 0 to 355px)
            if (keys.ArrowLeft && playerX > 0) {
                playerX -= 6;
            }
            if (keys.ArrowRight && playerX < 355) {
                playerX += 6;
            }
            player.style.left = playerX + 'px';

            // 2. Animate Road Lines to simulate driving speed
            roadLines.forEach(line => {
                let top = parseFloat(line.style.top);
                top += enemySpeed;
                if (top > 600) top = -80; // Loop line back to top
                line.style.top = top + 'px';
            });

            // 3. Move Enemy Car down
            enemyY += enemySpeed;
            if (enemyY > 600) {
                // Reset enemy to top and increment score
                enemyY = -100;
                enemyX = Math.floor(Math.random() * 355);
                score++;
                scoreDisplay.innerText = score;
                
                // Gradually increase difficulty
                if (score % 3 === 0) {
                    enemySpeed += 1;
                }
            }
            enemy.style.top = enemyY + 'px';
            enemy.style.left = enemyX + 'px';

            // 4. Collision Detection
            if (detectCollision(playerX, 500, enemyX, enemyY)) {
                endGame();
                return;
            }

            animationFrameId = requestAnimationFrame(updateGame);
        }

        function detectCollision(pX, pY, eX, eY) {
            // Check bounding boxes (Car width: 45px, height: 80px)
            return !(
                pX + 45 < eX || 
                pX > eX + 45 || 
                pY + 80 < eY || 
                pY > eY + 80
            );
        }

        function endGame() {
            isGameOver = true;
            finalScoreDisplay.innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        // Initialize the game automatically on load
        startGame();
    </script>
</body>
</html>

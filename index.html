<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Retro Arcade Racer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #050510;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* 3D Scene Setup */
        #scene {
            perspective: 300px;
            perspective-origin: 50% 20%;
            width: 100%;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* The 3D Tilted Road */
        #road {
            position: relative;
            width: 450px;
            height: 800px;
            background: #252528;
            transform: rotateX(60deg);
            transform-origin: bottom center;
            border-left: 10px dashed #ff0077;
            border-right: 10px dashed #ff0077;
            box-shadow: 0 0 30px rgba(255, 0, 119, 0.3);
            overflow: hidden;
        }

        /* Horizon Sky Effect */
        #horizon {
            position: absolute;
            top: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to bottom, #000022, #2c003e, #ff0055);
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Road Lines */
        .road-line {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 80px;
            background: #fff;
            box-shadow: 0 0 10px #fff;
        }

        /* 3D Car Bases */
        .car {
            position: absolute;
            width: 50px;
            height: 80px;
            border-radius: 6px;
            /* Keeps the cars upright against the tilted road */
            transform-style: preserve-3d; 
        }

        /* Sleeker Player Car Design */
        #player {
            background: #00f3ff;
            bottom: 40px;
            left: 200px;
            z-index: 5;
            box-shadow: 0 0 20px #00f3ff, inset 0 0 10px #000;
        }

        /* Car spoilers & details */
        #player::after, .enemy::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: -5px;
            width: 60px;
            height: 10px;
            background: inherit;
            border-radius: 3px;
        }

        /* Windshield */
        .car::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 5px;
            width: 40px;
            height: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px;
        }

        /* Enemy Car Design */
        .enemy {
            background: #ff0055;
            top: -100px;
            box-shadow: 0 0 20px #ff0055, inset 0 0 10px #000;
        }

        /* Heads Up Display */
        #hud {
            display: flex;
            gap: 40px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: -40px;
            z-index: 10;
            text-shadow: 0 0 10px #00f3ff;
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 16, 0.9);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }

        #game-over-screen h1 {
            color: #ff0055;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #ff0055;
        }

        #start-btn {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 18px;
            font-family: inherit;
            font-weight: bold;
            background: #00f3ff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 15px #00f3ff;
        }

        #start-btn:hover {
            background: #fff;
            box-shadow: 0 0 25px #fff;
        }

        .controls-hint {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>SPEED: <span id="speed-ui">100</span> MPH</div>
    </div>

    <div id="horizon"></div>

    <div id="scene">
        <div id="road">
            <div class="road-line" style="top: -100px;"></div>
            <div class="road-line" style="top: 50px;"></div>
            <div class="road-line" style="top: 200px;"></div>
            <div class="road-line" style="top: 350px;"></div>
            <div class="road-line" style="top: 500px;"></div>
            <div class="road-line" style="top: 650px;"></div>

            <div id="player" class="car"></div>
            <div id="enemy" class="car enemy"></div>

            <div id="game-over-screen">
                <h1>CRASHED!</h1>
                <p>FINAL SCORE: <span id="final-score">0</span></p>
                <button id="start-btn" onclick="startGame()">DRIVE AGAIN</button>
            </div>
        </div>
    </div>

    <div class="controls-hint">
        Use <b>A / D</b> to steer left/right.<br>
        Hold <b>W</b> to accelerate | Hold <b>S</b> to brake.
    </div>

    <script>
        const player = document.getElementById('player');
        const enemy = document.getElementById('enemy');
        const scoreDisplay = document.getElementById('score');
        const speedDisplay = document.getElementById('speed-ui');
        const finalScoreDisplay = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const roadLines = document.querySelectorAll('.road-line');

        // Game state parameters
        let playerX = 200; 
        let enemyX = 200;
        let enemyY = -100;
        
        let baseSpeed = 8;       // Game mechanics speed
        let dynamicSpeed = 8;    // Altered dynamically by W/S keys
        let score = 0;
        let isGameOver = false;
        let animationFrameId;

        // WASD key tracking
        const keys = {
            w: false,
            a: false,
            s: false,
            d: false
        };

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = true;
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = false;
        });

        function startGame() {
            playerX = 200;
            enemyX = Math.floor(Math.random() * 370) + 10;
            enemyY = -100;
            baseSpeed = 8;
            dynamicSpeed = 8;
            score = 0;
            isGameOver = false;
            
            scoreDisplay.innerText = score;
            player.style.left = playerX + 'px';
            gameOverScreen.style.display = 'none';

            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            updateGame();
        }

        function updateGame() {
            if (isGameOver) return;

            // 1. Dynamic Speed Control Logic (W to Boost, S to Slow Down)
            if (keys.w) {
                dynamicSpeed = baseSpeed + 4; // Turbo boost
            } else if (keys.s) {
                dynamicSpeed = Math.max(3, baseSpeed - 4); // Slam brakes
            } else {
                dynamicSpeed = baseSpeed; // Normal cruise speed
            }

            // Update virtual MPH display
            speedDisplay.innerText = Math.floor(dynamicSpeed * 15);

            // 2. Lateral Turning Mechanics (A and D Keys)
            if (keys.a && playerX > 15) {
                playerX -= 7;
            }
            if (keys.d && playerX < 385) {
                playerX += 7;
            }
            player.style.left = playerX + 'px';

            // 3. Move lines to simulate high-speed depth projection
            roadLines.forEach(line => {
                let top = parseFloat(line.style.top);
                top += dynamicSpeed;
                if (top > 800) top = -100; 
                line.style.top = top + 'px';
            });

            // 4. Oncoming Obstacle Behavior
            enemyY += dynamicSpeed * 0.9; // Moves relative to player engine speed
            if (enemyY > 800) {
                enemyY = -100;
                enemyX = Math.floor(Math.random() * 370) + 10; 
                score++;
                scoreDisplay.innerText = score;
                
                // Gradually step up difficulty over time
                if (score % 3 === 0) {
                    baseSpeed += 1;
                }
            }
            enemy.style.top = enemyY + 'px';
            enemy.style.left = enemyX + 'px';

            // 5. Precise Collision Mapping
            // Target player Y location mapped out to its CSS absolute bottom position (800 - 40px height - 40px offset = ~720)
            if (detectCollision(playerX, 680, enemyX, enemyY)) {
                endGame();
                return;
            }

            animationFrameId = requestAnimationFrame(updateGame);
        }

        function detectCollision(pX, pY, eX, eY) {
            // Check bounding collisions (Box Width: 50px, Height: 80px)
            return !(
                pX + 50 < eX || 
                pX > eX + 50 || 
                pY + 80 < eY || 
                pY > eY + 80
            );
        }

        function endGame() {
            isGameOver = true;
            finalScoreDisplay.innerText = score;
            gameOverScreen.style.display = 'flex';
        }

        // Auto-run program initialization
        startGame();
    </script>
</body>
</html>
